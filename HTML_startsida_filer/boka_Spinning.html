<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="/CSS/Bokningar.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/JavaScript/bokningar.js"></script>
</head>
<body>
            <!-- Navbar skapar en navigationsmeny högst upp på sidan.
            navbar-expand-lg = menyn är ihopfälld på små skärmar och
            visas horisontellt från large (lg) och uppåt.
            navbar-dark + bg-dark = mörk bakgrund och ljus text.-->
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <!-- container centrerar innehållet och ger marginaler på sidorna-->
            <div class="container">

                <!-- navbar-brand = logotyp eller webbplatsens namn-->
                <a class="navbar-brand" href="/index.html"><img src="/img/logo.jpg" width="110px" height="45px"></a>

                    <!-- navbar-toggler = en knapp osm visas på små skärmar (hamburgermeny).
                    data-bs-toggle="collapse" (aktiverar Bootstrap-funktionen)
                    data-bstarget="#menu" (kopplar knappen till elementet med id="menu")-->
                <button
                    class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menu"
                    >
                    <!-- Ikonen som visas i toggler knappen-->
                    <span class="navbar-toggler-icon"></span>
                </button>
                <!-- collapse navbar-collapse = menyn kan fällas ihop.
                id="menu" måste matcha data-bs-target i knappen ovan-->
                <div class="collapse navbar-collapse" id="menu">
                    <!-- navbar-nav är listan med navigationslänkar.
                    ms-auto = betyder margin-start auto och flyttar menyn åt höger-->
                    <ul class="navbar-nav ms-auto">
                        <!-- nav-item = varje menyval-->
                        <li class="nav-item">
                            <a class="nav-link" href="/index.html">Hem</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/Om_oss/Om_oss.html">Om oss</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/Kontakt/kontakt.html">Kontakt</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </form>
        <!-- Formulär för bokning-->
        <div class="contact">
        <h2>Boka ditt spinning pass 🚴🏼</h2>
        <form id="contactForm" action="file_name" method="get"onsubmit="return validateForm()">
        <label for="name">Namn:</label>
        <input type="text" id="name" name="name" >
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email">
        <br><br>
        <label for="message">Message:</label>
        <textarea id="message" name="message"></textarea>
        <br><br>
        <button type="submit">Boka</button>
    </form>
</body>
</html>
