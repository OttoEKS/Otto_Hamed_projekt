    <!-- Egen CSS -->
    <link rel="stylesheet" href="kontak.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/index.html">Aktiv</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="/index.html">Hem</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/Om_oss/Om_oss.html">Om oss</a>
                </li>
                <li class="nav-item">

                </li>
                <li class="nav-item">
                    <a class="nav-link" href="kontakt.html">Kontakt</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- HERO SECTION -->
<section class="hero text-center text-light d-flex align-items-center">
    <div class="container">
        <h1 class="display-4">Välkommen till mitt projekt</h1>
        <a href="#kontakt" class="btn btn-info btn-lg">Kontakta oss</a>
    </div>
</section>

<!-- KONTAKTFORMULÄR -->
<section id="kontakt" class="py-5">
    <div class="container">
        <h2 class="text-center mb-4">Om oss</h2>

        <div class="row justify-content-center">
            <div class="col-md-6">
                <form id="contactForm" class="shadow p-4 rounded bg-light">

                    <div class="mb-3">
                        <label class="form-label">Namn</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">E-post</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Meddelande</label>
                        <textarea class="form-control" id="message" rows="4" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Skicka
                    </button>
                </form>

                <div id="responseMessage" class="mt-3 text-center"></div>
            </div>
        </div>
    </div>
</section>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3">
    © 2026  Välkommen Åter till Aktiv Gymet för att träna och uppleva en hälsosam livsstil! 
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Egen JavaScript -->

</body>
</html>
